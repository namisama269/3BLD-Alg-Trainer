<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Cube Editor</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body" data-theme="dark">
    <main class="container-fluid py-4">
        <div class="row g-4">
            <div class="col-12 col-lg order-1 order-lg-2 controls-column">
                <div class="card bg-panel border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                            <h1 class="h3 mb-0">Visual Cube Editor</h1>
                            <div class="form-check form-switch m-0">
                                <input class="form-check-input" type="checkbox" id="themeToggle" checked>
                                <label class="form-check-label" for="themeToggle">Dark mode</label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="modeSelect" class="form-label">Mode</label>
                            <select id="modeSelect" class="form-select">
                                <option value="setupMoves">Setup / Moves</option>
                                <option value="cubeString">Cube string</option>
                            </select>
                        </div>

                        <div id="setupMovesWrapper">
                            <div class="mb-4">
                                <label for="setupInput" class="form-label">Setup</label>
                                <div class="sequence-card">
                                    <textarea id="setupInput" rows="1" class="form-control" placeholder="Optional setup sequence"></textarea>
                                    <div class="sequence-toolbar">
                                        <div class="alg-status" id="setupStatus">
                                            <span class="alg-status-dot"></span>
                                            <span class="alg-status-text" id="setupStatusText">Waiting for input</span>
                                        </div>
                                        <button type="button" class="btn btn-outline-secondary btn-sm" id="resetSetup">Reset</button>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="movesInput" class="form-label">Moves</label>
                                <div class="sequence-card">
                                    <div class="moves-input-wrapper">
                                        <div class="current-move-highlight is-empty" id="currentMoveHighlight"></div>
                                        <textarea id="movesInput" rows="4" class="form-control" placeholder="Line 1&#10;Line 2"></textarea>
                                    </div>
                                    <div class="sequence-toolbar">
                                        <div class="alg-status" id="movesStatus">
                                            <span class="alg-status-dot"></span>
                                            <span class="alg-status-text" id="movesStatusText">Waiting for input</span>
                                        </div>
                                        <div class="d-flex gap-2 flex-wrap">
                                            <button type="button" class="btn btn-primary btn-sm" id="openAlgButton">Open in alg.cubing.net</button>
                                            <button type="button" class="btn btn-outline-secondary btn-sm" id="resetMoves">Reset</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4" id="cubeStringWrapper" hidden>
                            <label class="form-label" for="cubeStringInput">Cube string</label>
                            <textarea id="cubeStringInput" rows="3" class="form-control" placeholder="Enter URFBLD characters, '.' or 'x'" autocomplete="off" spellcheck="false"></textarea>
                            <div class="d-flex justify-content-between align-items-center mt-2 gap-2 flex-wrap">
                                <div class="form-text m-0 cube-string-status" id="cubeStringStatus">Enter a cube string</div>
                                <button type="button" class="btn btn-outline-secondary btn-sm" id="clearCubeString">Clear</button>
                            </div>
                            <div class="mt-3" id="cubeStringColorSection" hidden>
                                <p class="form-label small text-muted mb-2">Custom sticker colors</p>
                                <div class="face-color-grid" id="cubeStringColors"></div>
                            </div>
                        </div>

                        <div class="card bg-subtle border-0 mb-4 basic-card">
                            <details class="measurements-details" open>
                                <summary class="measurements-summary">
                                    <span class="text-uppercase small fw-semibold text-muted">Basic settings</span>
                                    <span class="caret"></span>
                                </summary>
                                <div class="measurements-body">
                                    <div class="mb-4">
                                        <label for="cubeSize" class="form-label">Cube size</label>
                                        <select id="cubeSize" class="form-select">
                                            <option value="2">2×2×2</option>
                                            <option value="3" selected>3×3×3</option>
                                            <option value="4">4×4×4</option>
                                            <option value="5">5×5×5</option>
                                            <option value="6">6×6×6</option>
                                            <option value="7">7×7×7</option>
                                            <option value="8">8×8×8</option>
                                            <option value="9">9×9×9</option>
                                            <option value="10">10×10×10</option>
                                            <option value="11">11×11×11</option>
                                        </select>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label mb-2" for="initialMaskInput">Initial mask</label>
                                        <input type="text" class="form-control form-control-sm" id="initialMaskInput" autocomplete="off" spellcheck="false">
                                        <div class="d-flex justify-content-between align-items-center mt-2 gap-2 flex-wrap">
                                            <div class="form-text m-0 initial-mask-status" id="initialMaskStatus">No stickers masked</div>
                                            <button type="button" class="btn btn-outline-secondary btn-sm" id="resetInitialMask">Clear</button>
                                        </div>
                                    </div>

                                    <div class="form-check form-switch mb-2">
                                        <input class="form-check-input" type="checkbox" id="pannableToggle" checked>
                                        <label class="form-check-label" for="pannableToggle">Enable drag rotation</label>
                                    </div>

                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="zoomableToggle" checked>
                                        <label class="form-check-label" for="zoomableToggle">Enable scroll zoom</label>
                                    </div>

                                    <div class="settings-actions d-grid gap-2 mt-4">
                                        <button type="button" class="btn btn-primary" id="saveSettings">Save JSON</button>
                                        <button type="button" class="btn btn-outline-secondary" id="loadSettings">Load JSON</button>
                                        <input type="file" id="loadSettingsFile" accept="application/json" hidden>
                                    </div>
                                </div>
                            </details>
                        </div>

                        <div class="card bg-subtle border-0 mb-4 debug-card">
                            <details class="measurements-details" open>
                                <summary class="measurements-summary">
                                    <span class="text-uppercase small fw-semibold text-muted">Debug</span>
                                    <span class="caret"></span>
                                </summary>
                                <div class="measurements-body">
                                    <div class="form-check form-switch mb-3">
                                        <input class="form-check-input" type="checkbox" id="debugToggle">
                                        <label class="form-check-label" for="debugToggle">Debug mode (show draw order)</label>
                                    </div>

                                    <div class="mb-3" id="debugTextColorGroup" hidden>
                                        <label for="debugTextColor" class="form-label">Debug text color</label>
                                        <select id="debugTextColor" class="form-select">
                                            <option value="dark">Dark</option>
                                            <option value="light">Light</option>
                                        </select>
                                    </div>

                                    <div class="mb-3 render-faces-card">
                                        <p class="fw-semibold text-uppercase small text-muted mb-2">Render faces</p>
                                        <div class="render-face-grid">
                                            <label class="render-face-toggle">
                                                <input class="form-check-input" type="checkbox" id="renderU" checked>
                                                <span>U</span>
                                            </label>
                                            <label class="render-face-toggle">
                                                <input class="form-check-input" type="checkbox" id="renderD" checked>
                                                <span>D</span>
                                            </label>
                                            <label class="render-face-toggle">
                                                <input class="form-check-input" type="checkbox" id="renderR" checked>
                                                <span>R</span>
                                            </label>
                                            <label class="render-face-toggle">
                                                <input class="form-check-input" type="checkbox" id="renderL" checked>
                                                <span>L</span>
                                            </label>
                                            <label class="render-face-toggle">
                                                <input class="form-check-input" type="checkbox" id="renderF" checked>
                                                <span>F</span>
                                            </label>
                                            <label class="render-face-toggle">
                                                <input class="form-check-input" type="checkbox" id="renderB" checked>
                                                <span>B</span>
                                            </label>
                                        </div>
                                    </div>

                                    <button type="button" class="btn btn-secondary w-100" id="debugCubeString">Show cube string</button>
                                </div>
                            </details>
                        </div>

                        <div class="card bg-subtle border-0 mb-4 colors-card">
                            <details class="measurements-details" open>
                                <summary class="measurements-summary">
                                    <span class="text-uppercase small fw-semibold text-muted">Colors</span>
                                    <span class="caret"></span>
                                </summary>
                                <div class="measurements-body">
                                    <div class="mb-4">
                                        <h2 class="h6 text-uppercase text-muted mb-3">Face colors</h2>
                                        <div class="face-color-grid">
                                            <label class="face-color-pill">
                                                <span>U</span>
                                                <input type="color" id="colorU" class="form-control form-control-color">
                                            </label>
                                            <label class="face-color-pill">
                                                <span>D</span>
                                                <input type="color" id="colorD" class="form-control form-control-color">
                                            </label>
                                            <label class="face-color-pill">
                                                <span>R</span>
                                                <input type="color" id="colorR" class="form-control form-control-color">
                                            </label>
                                            <label class="face-color-pill">
                                                <span>L</span>
                                                <input type="color" id="colorL" class="form-control form-control-color">
                                            </label>
                                            <label class="face-color-pill">
                                                <span>F</span>
                                                <input type="color" id="colorF" class="form-control form-control-color">
                                            </label>
                                            <label class="face-color-pill">
                                                <span>B</span>
                                                <input type="color" id="colorB" class="form-control form-control-color">
                                            </label>
                                        </div>
                                    </div>

                                    <div class="mb-4 border-control">
                                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                                            <p class="mb-0 fw-semibold text-uppercase small text-muted">Sticker border</p>
                                            <div class="form-check form-switch m-0">
                                                <input class="form-check-input" type="checkbox" id="borderAuto" checked>
                                                <label class="form-check-label small" for="borderAuto">Automatic</label>
                                            </div>
                                        </div>
                                        <label class="form-label small" for="borderShade">Shade</label>
                                        <div class="d-flex align-items-center gap-2">
                                            <input type="range" class="form-range flex-grow-1" id="borderShade" min="0.2" max="1" step="0.05" value="0.85">
                                            <span class="badge text-bg-dark" id="borderShadeValue">0.85</span>
                                        </div>
                                        <div class="mt-3">
                                            <label class="form-label small" for="borderColor">Custom color</label>
                                            <input type="color" class="form-control form-control-color" id="borderColor" value="#000000" disabled>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="baseColor" class="form-label">Cube body</label>
                                        <div class="d-flex align-items-center gap-3">
                                            <input type="color" id="baseColor" class="form-control form-control-color">
                                            <div class="form-check form-switch m-0">
                                                <input class="form-check-input" type="checkbox" id="baseColorToggle" checked>
                                                <label class="form-check-label" for="baseColorToggle">Show base</label>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label for="bgColor" class="form-label">Background</label>
                                        <div class="d-flex flex-wrap gap-3 alignments-center">
                                            <input type="color" id="bgColor" class="form-control form-control-color">
                                            <div class="form-check form-switch m-0">
                                                <input class="form-check-input" type="checkbox" id="bgTransparent">
                                                <label class="form-check-label" for="bgTransparent">Transparent</label>
                                            </div>
                                            <button type="button" id="resetBg" class="btn btn-outline-secondary btn-sm">Reset</button>
                                        </div>
                                    </div>
                                </div>
                            </details>
                        </div>

                        <div class="card bg-subtle border-0 mb-4 measurements-card">
                            <details class="measurements-details" open>
                                <summary class="measurements-summary">
                                    <span class="text-uppercase small fw-semibold text-muted">Cube measurements</span>
                                    <span class="caret"></span>
                                </summary>
                                <div class="measurements-body">
                                    <div class="mb-4">
                                        <label class="form-label" for="sizeScale">Size scale</label>
                                        <input type="range" class="form-range" id="sizeScale" min="0.2" max="3.0" step="0.05" value="1">
                                        <div class="form-text">Value: <span id="sizeScaleValue">1.00×</span></div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label" for="stickerGap">Sticker gap (r)</label>
                                        <div class="row g-2 align-items-center">
                                            <div class="col-8">
                                                <input type="range" class="form-range" id="stickerGap" min="0.005" max="0.2" step="0.005" value="0.08">
                                            </div>
                                            <div class="col-4">
                                                <input type="number" class="form-control form-control-sm" id="stickerGapCustom" min="0.005" max="0.2" step="0.001" value="0.08">
                                            </div>
                                        </div>
                                        <div class="form-text">Value: <span id="stickerGapValue">0.08</span></div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label" for="borderRatio">Perimeter gap ratio</label>
                                        <input type="range" class="form-range" id="borderRatio" min="0" max="1" step="0.05" value="0.65">
                                        <div class="form-text">Value: <span id="borderRatioValue">0.65</span></div>
                                    </div>

                                    <div class="mb-1">
                                        <label class="form-label">Angles (radians)</label>
                                        <div class="row g-2 angles-inputs">
                                            <div class="col-4">
                                                <label class="form-label small text-muted mb-1" for="angleX">X</label>
                                                <input type="number" step="0.01" class="form-control form-control-sm" id="angleX">
                                            </div>
                                            <div class="col-4">
                                                <label class="form-label small text-muted mb-1" for="angleY">Y</label>
                                                <input type="number" step="0.01" class="form-control form-control-sm" id="angleY">
                                            </div>
                                            <div class="col-4">
                                                <label class="form-label small text-muted mb-1" for="angleZ">Z</label>
                                                <input type="number" step="0.01" class="form-control form-control-sm" id="angleZ">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </details>
                        </div>

                    </div>
                </div>
            </div>

            <div class="col-12 col-lg canvas-column order-2 order-lg-1">
                <div class="card bg-panel border-0 shadow-sm">
                    <canvas id="cubeCanvas" width="1200" height="1200" class="img-fluid"></canvas>
                </div>
            </div>

        </div>
    </main>

    <script src="cube.js"></script>
    <script src="visualCube.js"></script>
    <script src="nxnCube.js"></script>
    <script src="main.js"></script>
</body>
</html>
